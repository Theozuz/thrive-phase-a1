name: thrive_phase_a1
channels:
  - pytorch
  - conda-forge
dependencies:
  # Core scientific Python stack
  - python=3.11
  - numpy=1.26
  - scipy=1.11

  # ML / classification
  - scikit-learn=1.3

  # Data handling
  - pandas=2.2

  # EEG / BCI domain
  - mne=1.6

  # Statistics (BEST + Bayes factor + rmANOVA)
  - pingouin=0.5

  # Deep learning (R_FM, R_JEPA, R_JEPA_brain, A-7 ensemble)
  - pytorch=2.1
  - cpuonly        # swap for `pytorch-cuda=12.1` under conda-forge if GPU available

  # Build tooling
  - pip

  # Pip-only packages
  - pip:
      - moabb>=1.4.0
      - pyriemann>=0.5

      # Foundation-model package — choose ONE at OSF lock time
      # (replace {COMMIT_HASH} with the actual git rev at registration)
      # - "lcm-public @ git+https://github.com/<author>/lcm@{COMMIT_HASH}"
      # - "eegformer @ git+https://github.com/<author>/eegformer@{COMMIT_HASH}"
